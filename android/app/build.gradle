apply plugin: 'com.android.application'
// Aplicamos el plugin de Google Services para conectar con Firebase
apply plugin: 'com.google.gms.google-services'

def secretsPropertiesFile = rootProject.file("secrets.properties")
def secretsProperties = new Properties()
if (secretsPropertiesFile.exists()) {
    secretsProperties.load(new FileInputStream(secretsPropertiesFile))
}

android {
    namespace = "com.tuempresa.hoopsai"
    compileSdk = rootProject.ext.compileSdkVersion

    signingConfigs {
        release {
            storeFile file(secretsProperties['RELEASE_STORE_FILE'] ?: "key0")
            storePassword secretsProperties['RELEASE_STORE_PASSWORD'] ?: ""
            keyAlias secretsProperties['RELEASE_KEY_ALIAS'] ?: ""
            keyPassword secretsProperties['RELEASE_KEY_PASSWORD'] ?: ""
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    defaultConfig {
        applicationId "com.tuempresa.hoopsai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // CIBERSEGURIDAD 2026: Protección contra ataques de diccionario y bots
        resValue "string", "cleartext_traffic_perm", "false"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.release
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true 
            shrinkResources true 
            zipAlignEnabled true 
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
                debugSymbolLevel 'NONE'
            }
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // Play Integrity API: El estándar de Google para validar que el cliente es real (v1.6.0 para 2026)
    implementation 'com.google.android.play:integrity:1.6.0'
}

apply from: 'capacitor.build.gradle'
